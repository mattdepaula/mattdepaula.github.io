# --- Site settings ---
title: "Matheus de Paula"
description: "Software Engineer"
url: "https://mattdepaula.github.io"

# --- Theme (Cayman; bundled with GitHub Pages supported themes) ---
theme: jekyll-theme-cayman

# --- Build settings ---
markdown: kramdown
include:
  - _pages
plugins:
  - jekyll-feed
  - jekyll-sitemap

# --- Defaults applied to all pages ---
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# --- Exclude from build ---
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
